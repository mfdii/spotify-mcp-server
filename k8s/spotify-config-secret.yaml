---
# Spotify Configuration Secret
#
# This secret stores the spotify-config.json file needed by the MCP server.
#
# To create this secret from your local spotify-config.json file:
#
#   oc create secret generic spotify-config \
#     --from-file=spotify-config.json=./spotify-config.json
#
# To create this secret with inline data (update the values):
#
#   oc create secret generic spotify-config \
#     --from-literal=spotify-config.json='{
#       "clientId": "your-client-id",
#       "clientSecret": "your-client-secret",
#       "redirectUri": "http://127.0.0.1:8888/callback",
#       "accessToken": "your-access-token",
#       "refreshToken": "your-refresh-token",
#       "expiresAt": "2024-12-31T23:59:59.999Z"
#     }'
#
# NOTE: To get access and refresh tokens, run the auth flow locally:
#   1. Copy spotify-config.example.json to spotify-config.json
#   2. Fill in your clientId and clientSecret
#   3. Run: npm run auth
#   4. Complete the OAuth flow in your browser
#   5. Tokens will be saved to spotify-config.json
#   6. Create the secret from this file
#
# IMPORTANT: Keep this file out of version control!
# It is already listed in .gitignore and .dockerignore

apiVersion: v1
kind: Secret
metadata:
  name: spotify-config
  labels:
    app: spotify-mcp-server
type: Opaque
stringData:
  # Replace this entire block with your actual spotify-config.json contents
  spotify-config.json: |
    {
      "clientId": "your-client-id",
      "clientSecret": "your-client-secret",
      "redirectUri": "http://127.0.0.1:8888/callback",
      "accessToken": "run-npm-auth-locally-to-get-this",
      "refreshToken": "run-npm-auth-locally-to-get-this",
      "expiresAt": "automatically-set-during-authentication"
    }
